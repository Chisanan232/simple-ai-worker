# =============================================================================
# config/agents.yaml — Agent Team Configuration
# =============================================================================
#
# This file defines the full AI agent team for simple-ai-worker.
# It is loaded at startup and validated against the Pydantic schema in
# src/config/agent_config.py.
#
# Schema reference: see config/agents.example.yaml for full field documentation.
# =============================================================================

process: sequential

# =============================================================================
# mcp_servers — MCP Server Registry
# =============================================================================
#
# Defines all self-hosted MCP server connection details in one place.
# Each entry is keyed by a short unique ID (e.g. "jira", "clickup").
# Agents reference these IDs in their `mcps` list — no duplication required.
#
# ${VAR_NAME} placeholders in header values are resolved from AppSettings /
# environment variables at agent-build time (tokens never live in this file).
#
# Add a new integration in 2 steps:
#   1. Add a new entry here (e.g. "confluence")
#   2. Add "- confluence" to the mcps list of whichever agents need it
# =============================================================================

mcp_servers:

  # ---------------------------------------------------------------------------
  # JIRA MCP Server
  # Provides tools used by planner, dev_lead, and dev_agent.
  # Per-agent tool subsets are controlled by per-agent mcps override mappings.
  # ---------------------------------------------------------------------------
  jira:
    type: http
    url: "${MCP_JIRA_URL}"
    headers:
      Authorization: "Bearer ${MCP_JIRA_TOKEN}"
    tool_filter:
      - create_issue
      - get_issue
      - search_issues
      - update_issue
      - link_issues
      - transition_issue
      - add_comment
    cache_tools_list: true

  # ---------------------------------------------------------------------------
  # ClickUp MCP Server
  # Provides tools used by planner, dev_lead, and dev_agent.
  # ---------------------------------------------------------------------------
  clickup:
    type: http
    url: "${MCP_CLICKUP_URL}"
    headers:
      Authorization: "Bearer ${MCP_CLICKUP_TOKEN}"
    tool_filter:
      - create_task
      - get_task
      - search_tasks
      - update_task
      - add_comment
    cache_tools_list: true

  # ---------------------------------------------------------------------------
  # GitHub MCP Server
  # Provides: create_pull_request, search_repositories
  # ---------------------------------------------------------------------------
  github:
    type: http
    url: "${MCP_GITHUB_URL}"
    headers:
      Authorization: "Bearer ${MCP_GITHUB_TOKEN}"
    tool_filter:
      - create_pull_request
      - search_repositories
    cache_tools_list: true

  # ---------------------------------------------------------------------------
  # Slack MCP Server
  # Provides: send_message, reply_to_thread, get_messages
  # ---------------------------------------------------------------------------
  slack:
    type: http
    url: "${MCP_SLACK_URL}"
    headers:
      Authorization: "Bearer ${MCP_SLACK_TOKEN}"
    tool_filter:
      - send_message
      - reply_to_thread
      - get_messages
    cache_tools_list: false

# =============================================================================
# agents — Agent Team Definitions
# =============================================================================

agents:

  # ---------------------------------------------------------------------------
  # Planner Agent
  # Triggered by: @ai-worker [planner] <message> via Slack Bolt (primary)
  #               or planner_listener_job (APScheduler fallback)
  # ---------------------------------------------------------------------------
  - id: planner
    role: Product Planner
    goal: >
      Understand product requirements from human stakeholders, ask clarifying
      questions when the requirement is ambiguous, and create well-structured
      epic or story tickets in JIRA and ClickUp when the requirement is clear.
    backstory: >
      You are a seasoned product planner with 10+ years of experience in agile
      software development. You excel at distilling vague business requirements
      into clear, actionable epics and user stories. You communicate in a concise,
      professional tone and always confirm your understanding with the stakeholder
      before creating tickets. You are thorough, ask the right questions, and
      never make assumptions about scope or priority.
    llm:
      provider: openai
      model: gpt-4o
      options:
        temperature: 0.5
        max_tokens: 4096
        top_p: 1.0
        timeout: 120
    # MCP servers available to this agent (references mcp_servers registry above)
    mcps:
      - jira
      - clickup
      - slack
    apps: []
    allow_delegation: false
    verbose: false

  # ---------------------------------------------------------------------------
  # Dev Lead Agent
  # Triggered by: @ai-worker [dev lead] <message> via Slack Bolt (primary)
  #               or dev_lead_listener_job (APScheduler fallback)
  #
  # Three request modes handled by the Slack handler:
  #   A. Epic/Story Breakdown  — decompose a parent ticket into sub-tasks
  #                              with dependency links; notify planner.
  #   B. Ticket Amendment      — update fields, status, or add context to an
  #                              existing ticket.
  #   C. Feasibility Assessment — assess a new requirement, identify ambiguous
  #                              areas, ask clarifying questions in Slack
  #                              BEFORE creating any tickets (BR-7).
  # ---------------------------------------------------------------------------
  - id: dev_lead
    role: Technical Dev Lead
    goal: >
      Assess the feasibility of product requirements, ask targeted clarifying
      questions when a requirement is ambiguous, and — once all questions are
      answered — break down confirmed epics into well-scoped, dependency-annotated
      sub-tasks that development agents can execute independently. Update existing
      tickets with implementation directives when instructed by a human.
    backstory: >
      You are a senior software engineer and technical lead with deep expertise in
      system design, task decomposition, and agile estimation. When a human planner
      brings you a new requirement you first assess its technical feasibility,
      estimate scope, and identify any unclear or conflicting parts. You ask
      focused clarifying questions in the Slack thread before creating any tickets
      — you never decompose a requirement that still has open ambiguities (BR-7).
      Once the planner confirms all questions are answered you decompose the epic
      into precise sub-tasks with clear acceptance criteria, explicit inter-task
      dependency links, and implementation notes detailed enough for a developer
      to begin work immediately. After creating sub-tasks you post a summary
      comment on the parent ticket to notify the planner, then reply in the Slack
      thread with the full breakdown. You communicate in a structured, technical
      tone and never make assumptions about scope or architecture.
    llm:
      provider: openai
      model: gpt-4o
      options:
        temperature: 0.3
        max_tokens: 4096
        top_p: 1.0
        timeout: 120
    mcps:
      # Jira tools scoped to dev_lead responsibilities:
      #   - Feasibility (C): get_issue, search_issues
      #   - Breakdown   (A): create_issue, update_issue, link_issues,
      #                      transition_issue (set OPEN), add_comment (notify planner)
      #   - Amendment   (B): get_issue, update_issue, transition_issue, add_comment
      - server: jira
        tool_filter:
          - get_issue               # Feasibility/Amendment: read existing story/epic
          - search_issues           # Locate epics/stories by criteria
          - create_issue            # Breakdown: create sub-tasks
          - update_issue            # Breakdown: link sub-tasks to parent; Amendment: update fields
          - link_issues             # Breakdown: set dependency links between sub-tasks
          - transition_issue        # Breakdown: set OPEN/TO DO status on new sub-tasks
          - add_comment             # Breakdown: notify planner on parent; Amendment: add context
      # ClickUp tools scoped to dev_lead responsibilities:
      - server: clickup
        tool_filter:
          - get_task                # Feasibility/Amendment: read existing task
          - search_tasks            # Locate tasks by criteria
          - create_task             # Breakdown: create sub-tasks
          - update_task             # Breakdown: link/dependency; Amendment: update fields
          - add_comment             # Breakdown: notify planner; Amendment: add context
      # Slack: reply in thread (feasibility questions, breakdown summary, amendments)
      - server: slack
        tool_filter:
          - reply_to_thread         # Post clarifying questions and breakdown summary
          - get_messages            # Read thread history for context during discussion
          - send_message            # Notify planner channel after breakdown complete
    apps: []
    allow_delegation: false
    verbose: false

  # ---------------------------------------------------------------------------
  # Dev Agent
  # Triggered by: scan_and_dispatch_job     (APScheduler — ACCEPTED tickets)
  #               plan_and_notify_job       (APScheduler — OPEN / IN PLANNING tickets)
  #               @ai-worker [dev] <thread> (Slack Bolt — thread summary S3a)
  # ---------------------------------------------------------------------------
  - id: dev_agent
    role: Software Developer
    goal: >
      Scan for ready development tickets with no open dependencies, self-assign
      and implement them, open a GitHub pull request, and update the ticket
      status for human review. Also produce detailed development plans for newly
      created sub-tasks and revise plans based on human feedback before coding.
    backstory: >
      You are a skilled software developer who thrives in an autonomous,
      pull-based workflow. You proactively scan for available tasks, implement
      them with clean, well-tested code, open pull requests with descriptive
      summaries, and keep your ticket status up to date. You never start a task
      that has unresolved dependencies and you always notify the team when your
      work is ready for review. When a new sub-task arrives in OPEN status you
      first design a thorough development plan, post it as a Markdown comment on
      the ticket, and wait for human approval before writing any code. You
      incorporate reviewer feedback into revised plans until the ticket is moved
      to ACCEPTED by the human engineer.
    llm:
      provider: openai
      model: gpt-4o
      options:
        temperature: 0.2
        max_tokens: 4096
        top_p: 1.0
        timeout: 180

    # ── Workflow Operation Configuration ─────────────────────────────────────
    # Maps each named Dev Agent operation to the team's ticket status string.
    # Change ONLY this block to adapt the Dev Agent to a different team's
    # workflow — no Python code changes are required.
    #
    # Team B example:   scan_for_work.status_value: "Approved"
    # Project C example: scan_for_work.status_value: "Ready for Dev"
    # ─────────────────────────────────────────────────────────────────────────
    workflow:

      # The state that signals "this ticket is approved and ready for development".
      # human_only: true → AI may READ this state but NEVER WRITE it. (BR-1)
      scan_for_work:
        status_value: "ACCEPTED"
        human_only: true

      # Tickets in this state are silently skipped by the Dev Agent. (BR-3)
      skip_rejected:
        status_value: "REJECTED"

      # ── Phase 9: Dev Lead planning workflow ──────────────────────────────
      # Status set by the Dev Lead AI when creating sub-tasks from an epic.
      # Signals "waiting for Dev Agent to produce a development plan".
      # human_only: false → Dev Lead AI writes this when creating sub-tasks.
      open_for_dev:
        status_value: "OPEN"
        human_only: false

      # Status set by the HUMAN engineer after receiving the Dev Agent's plan.
      # human_only: true → AI may READ but NEVER WRITE this state. (BR-10)
      in_planning:
        status_value: "IN PLANNING"
        human_only: true
      # ─────────────────────────────────────────────────────────────────────

      # The Dev Agent transitions to this state as its very FIRST action
      # when it begins working on a ticket (before writing any code).
      start_development:
        status_value: "IN PROGRESS"

      # Transitioned to when the Dev Agent opens a GitHub PR.
      open_for_review:
        status_value: "IN REVIEW"

      # Transitioned to when the PR is merged (by user or by AI auto-merge).
      mark_complete:
        status_value: "COMPLETE"

      # update_with_context: no state change — only posts a discussion summary
      # comment to the ticket. No status_value needed.
      update_with_context:
        status_value: ""    # comment-only operation; no state transition

    mcps:
      - server: jira
        tool_filter:
          - search_issues           # SCAN_FOR_WORK — find ACCEPTED tickets (scan_and_dispatch)
                                    # OPEN_FOR_DEV / IN_PLANNING — find planning tickets (plan_and_notify)
          - get_issue               # fetch full ticket details (all modes)
          - transition_issue        # START_DEVELOPMENT, OPEN_FOR_REVIEW, MARK_COMPLETE
          - add_comment             # UPDATE_WITH_CONTEXT (S3a); post plan + notify (planning mode)
      - server: clickup
        tool_filter:
          - search_tasks            # SCAN_FOR_WORK / OPEN_FOR_DEV / IN_PLANNING
          - get_task                # fetch full task details
          - update_task             # START_DEVELOPMENT, OPEN_FOR_REVIEW, MARK_COMPLETE
          - add_comment             # UPDATE_WITH_CONTEXT (S3a); post plan + notify (planning mode)
      - server: github
        tool_filter:
          - create_pull_request         # OPEN_FOR_REVIEW — open PR after implementation
          - get_pull_request            # check approval + merge status (S7b)
          - merge_pull_request          # auto-merge approved PRs (S7b, BR-2)
          - get_pull_request_reviews    # detect CHANGES_REQUESTED (S6b)
          - get_pull_request_comments   # read inline review comments (S6b)
          - reply_to_review_comment     # confirm fix addressed (S6b)
          - request_review              # re-request review after fixes (optional)
          - search_repositories         # locate the correct repo for PR creation
      - server: slack
        tool_filter:
          - send_message            # post notifications (PR opened, merged, plan ready)
          - reply_to_thread         # S3a confirmation reply; S3b ask-for-ticket-id
          - get_messages            # fetch full Slack thread history (S3a)
          - get_thread_permalink    # construct permalink for ticket comment
    apps: []
    allow_delegation: false
    verbose: false
