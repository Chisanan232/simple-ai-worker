# =============================================================================
# config/agents.yaml — Agent Team Configuration
# =============================================================================
#
# This file defines the full AI agent team for simple-ai-worker.
# It is loaded at startup and validated against the Pydantic schema in
# src/config/agent_config.py.
#
# Schema reference: see config/agents.example.yaml for full field documentation.
# =============================================================================

process: sequential

# =============================================================================
# mcp_servers — MCP Server Registry
# =============================================================================
#
# Defines all self-hosted MCP server connection details in one place.
# Each entry is keyed by a short unique ID (e.g. "jira", "clickup").
# Agents reference these IDs in their `mcps` list — no duplication required.
#
# ${VAR_NAME} placeholders in header values are resolved from AppSettings /
# environment variables at agent-build time (tokens never live in this file).
#
# Add a new integration in 2 steps:
#   1. Add a new entry here (e.g. "confluence")
#   2. Add "- confluence" to the mcps list of whichever agents need it
# =============================================================================

mcp_servers:

  # ---------------------------------------------------------------------------
  # JIRA MCP Server
  # Provides: create_issue, search_issues, update_issue, transition_issue
  # ---------------------------------------------------------------------------
  jira:
    type: http
    url: "${MCP_JIRA_URL}"
    headers:
      Authorization: "Bearer ${MCP_JIRA_TOKEN}"
    tool_filter:
      - create_issue
      - search_issues
      - update_issue
      - transition_issue
    cache_tools_list: true

  # ---------------------------------------------------------------------------
  # ClickUp MCP Server
  # Provides: create_task, search_tasks, update_task
  # ---------------------------------------------------------------------------
  clickup:
    type: http
    url: "${MCP_CLICKUP_URL}"
    headers:
      Authorization: "Bearer ${MCP_CLICKUP_TOKEN}"
    tool_filter:
      - create_task
      - search_tasks
      - update_task
    cache_tools_list: true

  # ---------------------------------------------------------------------------
  # GitHub MCP Server
  # Provides: create_pull_request, search_repositories
  # ---------------------------------------------------------------------------
  github:
    type: http
    url: "${MCP_GITHUB_URL}"
    headers:
      Authorization: "Bearer ${MCP_GITHUB_TOKEN}"
    tool_filter:
      - create_pull_request
      - search_repositories
    cache_tools_list: true

  # ---------------------------------------------------------------------------
  # Slack MCP Server
  # Provides: send_message, reply_to_thread, get_messages
  # ---------------------------------------------------------------------------
  slack:
    type: http
    url: "${MCP_SLACK_URL}"
    headers:
      Authorization: "Bearer ${MCP_SLACK_TOKEN}"
    tool_filter:
      - send_message
      - reply_to_thread
      - get_messages
    cache_tools_list: false

# =============================================================================
# agents — Agent Team Definitions
# =============================================================================

agents:

  # ---------------------------------------------------------------------------
  # Planner Agent
  # Triggered by: @ai-worker [planner] <message> via Slack Bolt (primary)
  #               or planner_listener_job (APScheduler fallback)
  # ---------------------------------------------------------------------------
  - id: planner
    role: Product Planner
    goal: >
      Understand product requirements from human stakeholders, ask clarifying
      questions when the requirement is ambiguous, and create well-structured
      epic or story tickets in JIRA and ClickUp when the requirement is clear.
    backstory: >
      You are a seasoned product planner with 10+ years of experience in agile
      software development. You excel at distilling vague business requirements
      into clear, actionable epics and user stories. You communicate in a concise,
      professional tone and always confirm your understanding with the stakeholder
      before creating tickets. You are thorough, ask the right questions, and
      never make assumptions about scope or priority.
    llm:
      provider: openai
      model: gpt-4o
      options:
        temperature: 0.5
        max_tokens: 4096
        top_p: 1.0
        timeout: 120
    # MCP servers available to this agent (references mcp_servers registry above)
    mcps:
      - jira
      - clickup
      - slack
    apps: []
    allow_delegation: false
    verbose: false

  # ---------------------------------------------------------------------------
  # Dev Lead Agent
  # Triggered by: @ai-worker [dev lead] <message> via Slack Bolt (primary)
  #               or dev_lead_listener_job (APScheduler fallback)
  # ---------------------------------------------------------------------------
  - id: dev_lead
    role: Technical Dev Lead
    goal: >
      Break down product epics into well-scoped, dependency-annotated sub-tasks
      that development agents can execute independently. Update existing tickets
      with implementation directives when instructed by a human.
    backstory: >
      You are a senior software engineer and technical lead with deep expertise in
      system design, task decomposition, and agile estimation. You receive product
      epics from the Planner and decompose them into precise sub-tasks with clear
      acceptance criteria, explicit inter-task dependencies, and implementation
      notes. You communicate in a structured, technical tone and always annotate
      your sub-tasks with enough context for a developer to begin work without
      further clarification.
    llm:
      provider: openai
      model: gpt-4o
      options:
        temperature: 0.3
        max_tokens: 4096
        top_p: 1.0
        timeout: 120
    mcps:
      - jira
      - clickup
      - slack
    apps: []
    allow_delegation: false
    verbose: false

  # ---------------------------------------------------------------------------
  # Dev Agent
  # Triggered by: scan_and_dispatch_job (APScheduler pull model)
  # ---------------------------------------------------------------------------
  - id: dev_agent
    role: Software Developer
    goal: >
      Scan for ready development tickets with no open dependencies, self-assign
      and implement them, open a GitHub pull request, and update the ticket
      status for human review.
    backstory: >
      You are a skilled software developer who thrives in an autonomous,
      pull-based workflow. You proactively scan for available tasks, implement
      them with clean, well-tested code, open pull requests with descriptive
      summaries, and keep your ticket status up to date. You never start a task
      that has unresolved dependencies and you always notify the team when your
      work is ready for review.
    llm:
      provider: openai
      model: gpt-4o
      options:
        temperature: 0.2
        max_tokens: 4096
        top_p: 1.0
        timeout: 180

    # ── Workflow Operation Configuration ─────────────────────────────────────
    # Maps each named Dev Agent operation to the team's ticket status string.
    # Change ONLY this block to adapt the Dev Agent to a different team's
    # workflow — no Python code changes are required.
    #
    # Team B example:   scan_for_work.status_value: "Approved"
    # Project C example: scan_for_work.status_value: "Ready for Dev"
    # ─────────────────────────────────────────────────────────────────────────
    workflow:

      # The state that signals "this ticket is approved and ready for development".
      # human_only: true → AI may READ this state but NEVER WRITE it. (BR-1)
      scan_for_work:
        status_value: "ACCEPTED"
        human_only: true

      # Tickets in this state are silently skipped by the Dev Agent. (BR-3)
      skip_rejected:
        status_value: "REJECTED"

      # The Dev Agent transitions to this state as its very FIRST action
      # when it begins working on a ticket (before writing any code).
      start_development:
        status_value: "IN PROGRESS"

      # Transitioned to when the Dev Agent opens a GitHub PR.
      open_for_review:
        status_value: "IN REVIEW"

      # Transitioned to when the PR is merged (by user or by AI auto-merge).
      mark_complete:
        status_value: "COMPLETE"

      # update_with_context: no state change — only posts a discussion summary
      # comment to the ticket. No status_value needed.
      update_with_context:
        status_value: ""    # comment-only operation; no state transition

    mcps:
      - server: jira
        tool_filter:
          - search_issues           # SCAN_FOR_WORK — find ready tickets
          - get_issue               # fetch full ticket details
          - transition_issue        # START_DEVELOPMENT, OPEN_FOR_REVIEW, MARK_COMPLETE
          - add_comment             # UPDATE_WITH_CONTEXT — post Slack thread summary (S3a)
      - server: clickup
        tool_filter:
          - search_tasks            # SCAN_FOR_WORK
          - get_task                # fetch full task details
          - update_task             # START_DEVELOPMENT, OPEN_FOR_REVIEW, MARK_COMPLETE
          - add_comment             # UPDATE_WITH_CONTEXT — post Slack thread summary (S3a)
      - server: github
        tool_filter:
          - create_pull_request         # OPEN_FOR_REVIEW — open PR after implementation
          - get_pull_request            # check approval + merge status (S7b)
          - merge_pull_request          # auto-merge approved PRs (S7b, BR-2)
          - get_pull_request_reviews    # detect CHANGES_REQUESTED (S6b)
          - get_pull_request_comments   # read inline review comments (S6b)
          - reply_to_review_comment     # confirm fix addressed (S6b)
          - request_review              # re-request review after fixes (optional)
          - search_repositories         # locate the correct repo for PR creation
      - server: slack
        tool_filter:
          - send_message            # post notifications (PR opened, merged)
          - reply_to_thread         # S3a confirmation reply; S3b ask-for-ticket-id
          - get_messages            # fetch full Slack thread history (S3a)
          - get_thread_permalink    # construct permalink for ticket comment
    apps: []
    allow_delegation: false
    verbose: false
