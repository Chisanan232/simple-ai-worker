# =============================================================================
# config/agents.example.yaml — Annotated Agent Team Configuration Template
# =============================================================================
#
# This file is a fully annotated copy of agents.yaml.
# Copy it to agents.yaml (or the path set in AGENT_CONFIG_PATH) and customise
# the values to suit your deployment.
#
#   cp config/agents.example.yaml config/agents.yaml
#
# YAML is loaded by src/config/loader.py and validated by the Pydantic models
# in src/config/agent_config.py.  The application fails fast with a clear
# error if this file is malformed or missing required fields.
#
# =============================================================================


# -----------------------------------------------------------------------------
# process  (optional, default: "sequential")
# -----------------------------------------------------------------------------
# Controls how CrewAI executes tasks within a crew.
#
#   sequential    — tasks run one after another in the order listed.
#                   Simple and predictable; suitable for most use-cases.
#
#   hierarchical  — a "manager" agent is injected automatically by CrewAI to
#                   delegate and coordinate sub-tasks.  More powerful but
#                   requires the manager LLM to be capable of function-calling.
#
process: sequential


# =============================================================================
# mcp_servers  (optional, dict keyed by server ID, default: {})
# =============================================================================
#
# LAYER 1 — The MCP Server Registry.
#
# Defines all self-hosted MCP (Model Context Protocol) server connection
# details in one central place.  Each entry is keyed by a short, unique
# identifier (e.g. "jira", "clickup").  Agents reference these IDs in their
# `mcps` list — no configuration is ever duplicated across agents.
#
# How to add a new integration in 2 steps:
#   1. Add a new entry here (e.g. "confluence")
#   2. Add "- confluence" to the `mcps` list of whichever agents need it
#
# Placeholder resolution:
#   ${VAR_NAME} tokens in `headers` values are automatically replaced with
#   the value of the matching AppSettings field or OS environment variable
#   at agent-build time.  This keeps secrets out of YAML.
#   Supported patterns:
#     ${MCP_JIRA_TOKEN}    → AppSettings.MCP_JIRA_TOKEN   (SecretStr)
#     ${MCP_GITHUB_TOKEN}  → AppSettings.MCP_GITHUB_TOKEN (SecretStr)
#     ${ANY_ENV_VAR}       → os.environ["ANY_ENV_VAR"]
#
# -----------------------------------------------------------------------------
# Supported transport types
# -----------------------------------------------------------------------------
#
# type: http   — HTTP/Streamable-HTTP (recommended for self-hosted servers)
#   url              (required) Full URL to the MCP endpoint.
#   headers          (optional) Dict of HTTP headers (use ${TOKEN} placeholders).
#   streamable       (optional, default: true) Use chunked-streaming POST.
#   tool_filter      (optional) Allow-list of tool names. Omit = all tools.
#   cache_tools_list (optional, default: false) Cache tool schemas after first
#                    connect. Set true for stable servers (JIRA, GitHub) to
#                    avoid repeated list_tools() round-trips.
#
# type: sse    — Server-Sent Events (for legacy MCP servers)
#   url              (required)
#   headers          (optional)
#   tool_filter      (optional)
#   cache_tools_list (optional, default: false)
#
# type: stdio  — Subprocess via stdin/stdout (for local MCP servers)
#   command          (required) Executable to launch (e.g. "python", "npx").
#   args             (optional) List of arguments.
#   env              (optional) Dict of environment variables for the process.
#   tool_filter      (optional)
#   cache_tools_list (optional, default: false)
#
# -----------------------------------------------------------------------------

mcp_servers:

  # ---------------------------------------------------------------------------
  # Example: HTTP transport (recommended)
  # ---------------------------------------------------------------------------
  jira:
    type: http
    url: "${MCP_JIRA_URL}"              # resolved from .env / env at startup
    headers:
      Authorization: "Bearer ${MCP_JIRA_TOKEN}"   # resolved from .env / env
    tool_filter:                         # omit this block to expose all tools
      - create_issue
      - search_issues
      - update_issue
      - transition_issue
    cache_tools_list: true               # safe: JIRA tool schema rarely changes

  clickup:
    type: http
    url: "${MCP_CLICKUP_URL}"
    headers:
      Authorization: "Bearer ${MCP_CLICKUP_TOKEN}"
    tool_filter:
      - create_task
      - search_tasks
      - update_task
    cache_tools_list: true

  github:
    type: http
    url: "${MCP_GITHUB_URL}"
    headers:
      Authorization: "Bearer ${MCP_GITHUB_TOKEN}"
    tool_filter:
      - create_pull_request
      - search_repositories
    cache_tools_list: true

  slack:
    type: http
    url: "${MCP_SLACK_URL}"
    headers:
      Authorization: "Bearer ${MCP_SLACK_TOKEN}"
    tool_filter:
      - send_message
      - reply_to_thread
      - get_messages
    cache_tools_list: false              # set true if Slack tool schema is stable

  # ---------------------------------------------------------------------------
  # Example: SSE transport (legacy MCP servers)
  # ---------------------------------------------------------------------------
  # confluence:
  #   type: sse
  #   url: "http://127.0.0.1:8104/mcp/sse"
  #   headers:
  #     Authorization: "Bearer ${MCP_CONFLUENCE_TOKEN}"
  #   tool_filter:
  #     - search_pages
  #     - create_page
  #   cache_tools_list: false

  # ---------------------------------------------------------------------------
  # Example: stdio transport (local subprocess MCP server)
  # ---------------------------------------------------------------------------
  # local_fs:
  #   type: stdio
  #   command: npx
  #   args:
  #     - "-y"
  #     - "@modelcontextprotocol/server-filesystem"
  #     - "/tmp/workspace"
  #   tool_filter:
  #     - read_file
  #     - write_file
  #   cache_tools_list: false


# =============================================================================
# agents  (required, must contain at least one entry)
# =============================================================================
#
# LAYER 2 — Agent definitions.  Each agent references MCP servers by ID from
# the `mcp_servers` registry above.
#
# All agent `id` values must be unique within this file.
# All IDs listed in `mcps` must match a key in `mcp_servers`; the loader
# raises a clear error immediately if a reference cannot be resolved.
#
agents:

  # ---------------------------------------------------------------------------
  # Example agent entry — annotated field-by-field
  # ---------------------------------------------------------------------------
  - # id  (required, string, must be unique)
    # Unique identifier for this agent.  Used as the dictionary key in
    # AgentRegistry.  Stick to snake_case for clarity.
    # Examples: "planner", "dev_lead", "dev_agent", "qa_agent"
    id: planner

    # role  (required, string)
    # Short role title shown in CrewAI logging and the LLM system prompt.
    # Examples: "Product Planner", "Technical Dev Lead", "Software Developer"
    role: Product Planner

    # goal  (required, string)
    # One-sentence goal statement — what the agent is trying to achieve.
    # YAML block scalar (>) folds newlines into spaces — good for long text.
    goal: >
      Understand product requirements from human stakeholders and create
      well-structured epic or story tickets in JIRA and ClickUp.

    # backstory  (required, string)
    # Multi-sentence persona fed to the LLM to shape tone and behaviour.
    backstory: >
      You are a seasoned product planner with 10+ years of experience in agile
      software development. You excel at distilling vague business requirements
      into clear, actionable epics and user stories.

    # llm  (required, object)
    # Language model configuration for this agent.
    llm:

      # provider  (required, one of: "openai" | "anthropic")
      # Selects which LLM backend to use.
      # The corresponding API key must be set in .env:
      #   openai    → OPENAI_API_KEY
      #   anthropic → ANTHROPIC_API_KEY
      provider: openai

      # model  (required, string)
      # OpenAI:    gpt-4o, gpt-4o-mini, gpt-4-turbo, o1-preview
      # Anthropic: claude-3-5-sonnet-latest, claude-3-opus-latest
      model: gpt-4o

      # options  (optional — all sub-fields have defaults)
      # Fine-grained generation parameters.
      options:

        # temperature  (float, 0.0–2.0, default: 0.7)
        # Higher → more creative/random.  Lower → more deterministic.
        # Recommended ranges:
        #   planner / lead  → 0.3–0.6  (structured output preferred)
        #   dev agent       → 0.1–0.3  (code generation, low randomness)
        temperature: 0.5

        # max_tokens  (int, >0, default: 4096)
        # Maximum tokens the model may generate in a single response.
        max_tokens: 4096

        # top_p  (float, (0.0, 1.0], default: 1.0)
        # Nucleus sampling parameter.  1.0 disables it (all tokens eligible).
        top_p: 1.0

        # timeout  (int, seconds, >0, default: 120)
        # HTTP timeout for a single LLM API call.
        # Increase for complex tasks that may take longer to respond.
        timeout: 120

    # mcps  (optional, list, default: [])   ← LAYER 2 references
    # -------------------------------------------------------------------------
    # List of MCP server IDs from the `mcp_servers` registry above.
    # Each entry is one of:
    #
    #   Plain string reference — use the registry definition as-is:
    #     - jira
    #     - clickup
    #
    #   Override mapping — reference the registry but narrow the tool_filter
    #   for THIS agent only (URL, transport, and auth remain from registry):
    #     - server: jira
    #       tool_filter:
    #         - create_issue
    #         - search_issues
    #
    # Use plain strings when the registry tool_filter is already correct for
    # this agent.  Use the override mapping when different agents need
    # different tool subsets from the same server.
    # -------------------------------------------------------------------------
    mcps:
      - jira          # plain reference → uses all tools from registry
      - clickup
      - slack

    # apps  (optional, list of strings, default: [])
    # ---------------------------------------------------------------------------
    # DEPRECATED — use `mcps` for new integrations.
    # Legacy CrewAI Enterprise native action IDs (e.g. "jira/create_issue").
    # Passed directly to crewai.Agent(apps=[...]).
    # Set to [] when using mcps; both fields coexist during migration.
    # ---------------------------------------------------------------------------
    apps: []

    # allow_delegation  (bool, default: false)
    # Whether this agent may delegate tasks to other agents in the same crew.
    # Set to true only for hierarchical process managers.
    allow_delegation: false

    # verbose  (bool, default: false)
    # Whether CrewAI prints step-by-step reasoning output for this agent.
    # Useful for debugging but noisy in production.
    verbose: false

  # ---------------------------------------------------------------------------
  # Additional agents follow the same structure — add as many as needed.
  # ---------------------------------------------------------------------------

  - id: dev_lead
    role: Technical Dev Lead
    goal: >
      Break down product epics into well-scoped, dependency-annotated sub-tasks
      that development agents can execute independently.
    backstory: >
      You are a senior software engineer and technical lead with deep expertise in
      system design, task decomposition, and agile estimation.
    llm:
      provider: openai
      model: gpt-4o
      options:
        temperature: 0.3
        max_tokens: 4096
        top_p: 1.0
        timeout: 120
    # Example of the override mapping syntax — restrict jira tools for this agent
    mcps:
      - server: jira
        tool_filter:
          - search_issues
          - update_issue
          - transition_issue
      - clickup
      - slack
    apps: []
    allow_delegation: false
    verbose: false

  - id: dev_agent
    role: Software Developer
    goal: >
      Scan for ready development tickets, implement them, open GitHub pull
      requests, and update ticket status for human review.
    backstory: >
      You are a skilled software developer who thrives in an autonomous,
      pull-based workflow. You proactively scan for available tasks and
      implement them with clean, well-tested code.
    llm:
      provider: openai
      model: gpt-4o
      options:
        temperature: 0.2
        max_tokens: 4096
        top_p: 1.0
        timeout: 180
    mcps:
      - jira
      - clickup
      - github          # dev_agent is the only role that needs GitHub
      - slack
    apps: []
    allow_delegation: false
    verbose: false
