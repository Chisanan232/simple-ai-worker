# pytest.ini
[pytest]
minversion = 7.0.0
addopts =
    --cov=src/
    --cov-config=./.coveragerc
    -r a
    -vv
    --reruns 1

log_cli = 1
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format=%Y-%m-%d %H:%M:%S

markers =
    unit:        Fast, pure-Python tests (no I/O, no LLM)
    integration: Multi-component tests with mocked external I/O
    e2e:         Full workflow tests against HTTP stubs (excluded from standard CI)
    slow:        Tests that make real LLM API calls (requires credentials)
